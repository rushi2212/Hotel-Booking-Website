services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  automation:
    image: mcr.microsoft.com/playwright/python:v1.49.1-noble
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost:5173}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-Hotel Booking Test Automation}
      - BASE_URL=http://frontend:5173
      - API_HEALTH_URL=http://backend:8000/health
    command: >
      bash -lc "pip install -r automation/requirements.txt
      && python automation/generate_test_cases.py
      && python automation/run_tests.py"
    depends_on:
      - frontend
      - backend


